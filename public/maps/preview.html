<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Map drafts preview</title>
  <style>
    body { margin: 0; padding: 24px; background: #2c1d10; font-family: system-ui, sans-serif; }
    h2 { color: #f4ead0; margin: 24px 16px 8px; font-weight: 500; letter-spacing: 1px; }
    p.note { color: #c9b78c; margin: 0 16px 16px; font-size: 13px; opacity: 0.75; }
    .frame { background: #f4ead0; padding: 0; margin: 0 16px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); max-width: 1100px; }
    object { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <h2>1 · world-base.svg — 全球底图 (Equal Earth)</h2>
  <div class="frame"><object data="/maps/world-base.svg" type="image/svg+xml"></object></div>

  <h2>2 · europe-1200.svg — Topic 主图 (Magna Carta)</h2>
  <div class="frame"><object data="/maps/europe-1200.svg" type="image/svg+xml"></object></div>
</body>
</html>
