<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>Maps preview</title>
<style>
body{margin:0;padding:24px;background:#2c1d10;font-family:-apple-system,'PingFang SC',system-ui,sans-serif;}
h2{color:#f4ead0;margin:24px 16px 8px;font-weight:500;letter-spacing:1px;font-size:18px;}
.frame{background:#f4ead0;margin:0 16px 32px;box-shadow:0 4px 20px rgba(0,0,0,0.4);max-width:1100px;}
.frame>object{display:block;width:100%;height:auto;}
</style>
</head>
<body>
<h2>1 · world-base.svg</h2>

<h2>2 · europe-1200.svg</h2>
<div class="frame"><object data="/maps/europe-1200.svg" type="image/svg+xml"></object></div>

<h2>3 · europe-modern.svg (U11 — 标签位置优化)</h2>
<div class="frame"><object data="/maps/europe-modern.svg" type="image/svg+xml"></object></div>

<h2>4 · tang-china.svg (U10 — 唐宋盛世新图)</h2>
<div class="frame"><object data="/maps/tang-china.svg" type="image/svg+xml"></object></div>
</body>
</html>
