name: Atlas CI

on:
  pull_request:
    paths:
      - 'pages/atlas-lab/**'
      - 'pages/atlas-lab.js'
      - 'components/HistoricalAtlas.js'
      - 'components/CausalityPanel.js'
      - 'components/CausalSummary.js'
      - 'components/AtlasLabPage.js'
      - 'components/AtlasOnboarding.js'
      - 'components/MapLegend.js'
      - 'components/WorldLocator.js'
      - 'lib/atlas-renderer.js'
      - 'lib/atlas-views.js'
      - 'data/atlas/**'
      - 'scripts/validate-atlas.mjs'
      - 'scripts/test-atlas-renderer.mjs'
  push:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate atlas data
        run: npm run validate:atlas

      - name: Run renderer tests
        run: npm run test:atlas

      - name: Build (ensures pages compile)
        run: npm run build
        env:
          # Skip env-required pages that aren't atlas-related
          NEXT_TELEMETRY_DISABLED: '1'
